<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Moderación - Tu Parcela Lista</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CRM CSS -->
  <link rel="stylesheet" href="crm.css?v=1">
  
  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../publicar-parcela/supabase-config.js"></script>
</head>
<body>

  <!-- Pantalla de Login -->
  <div id="login-view" class="view-container active">
    <div class="login-box">
      <div class="login-header">
        <h2>Tu Parcela Lista</h2>
        <span>CRM Administración</span>
      </div>
      <form id="login-form">
        <div class="input-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" required placeholder="admin@tuparcelalista.cl">
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" id="btn-login">Ingresar al Sistema</button>
        <p id="login-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- Dashboard Principal -->
  <div id="dashboard-view" class="view-container" style="display: none;">
    <aside class="sidebar">
      <div class="sidebar-brand">TPL Admin</div>
      <nav class="sidebar-nav">
        <a href="#" class="active"><i data-lucide="inbox"></i> Solicitudes</a>
      </nav>
      <div class="sidebar-bottom">
        <button id="btn-logout"><i data-lucide="log-out"></i> Cerrar sesión</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1>Moderación de Parcelas</h1>
        <div class="user-info">
          <span id="user-name-display">Cargando...</span>
          <div class="avatar"><i data-lucide="user"></i></div>
        </div>
      </header>

      <!-- Métricas -->
      <section class="metrics-grid">
        <div class="metric-card warning">
          <div class="metric-icon"><i data-lucide="clock"></i></div>
          <div class="metric-data">
            <span class="metric-value" id="metric-pendientes">-</span>
            <span class="metric-label">Pendientes</span>
          </div>
        </div>
        <div class="metric-card info">
          <div class="metric-icon"><i data-lucide="alert-circle"></i></div>
          <div class="metric-data">
            <span class="metric-value" id="metric-corregir">-</span>
            <span class="metric-label">En Corrección</span>
          </div>
        </div>
        <div class="metric-card success">
          <div class="metric-icon"><i data-lucide="check-circle"></i></div>
          <div class="metric-data">
            <span class="metric-value" id="metric-aprobadas">-</span>
            <span class="metric-label">Aprobadas</span>
          </div>
        </div>
        <div class="metric-card danger">
          <div class="metric-icon"><i data-lucide="x-circle"></i></div>
          <div class="metric-data">
            <span class="metric-value" id="metric-rechazadas">-</span>
            <span class="metric-label">Rechazadas</span>
          </div>
        </div>
      </section>

      <!-- Filtros -->
      <section class="filters-bar">
        <select id="filter-estado">
          <option value="">Todos los estados</option>
          <option value="pendiente_revision" selected>Pendientes de Revisión</option>
          <option value="requiere_cambios">Requiere Cambios</option>
          <option value="aprobada">Aprobadas</option>
          <option value="rechazada">Rechazadas</option>
        </select>
        <button id="btn-refresh"><i data-lucide="refresh-cw"></i> Actualizar</button>
      </section>

      <!-- Tabla -->
      <section class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Propiedad</th>
              <th>Corredor / Dueño</th>
              <th>Comuna</th>
              <th>Plan</th>
              <th>Estado</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Filas dinámicas -->
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- Modal Detalle Publicación -->
  <div id="modal-detalle" class="modal-overlay">
    <div class="modal-box modal-lg">
      <div class="modal-header">
        <h2>Revisión de Publicación</h2>
        <button class="modal-close" id="btn-close-modal"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="modal-content">
        <!-- Detalle cargado por JS -->
      </div>
      <div class="modal-footer" id="modal-actions">
        <!-- Botones dinámicos -->
      </div>
    </div>
  </div>

  <!-- Modal de Rechazo/Corrección -->
  <div id="modal-feedback" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="feedback-title">Indicar Motivo</h2>
        <button class="modal-close" id="btn-close-feedback"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Motivo detallado para el corredor</label>
          <textarea id="feedback-motivo" rows="4" placeholder="Ej: Las fotos están borrosas..."></textarea>
        </div>
        <p id="feedback-error" class="error-msg"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-feedback">Cancelar</button>
        <button class="btn-primary" id="btn-confirm-feedback">Confirmar Acción</button>
      </div>
    </div>
  </div>

  <script src="crm.js?v=1" defer></script>
</body>
</html>
