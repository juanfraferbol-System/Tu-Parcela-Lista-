  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postula como Contratista - Tu Parcela Lista</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #003f7a;
      --secondary: #00828a;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .form-container {
      background: var(--surface);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 500px;
      margin: 20px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
      margin-top: 0;
    }
    p {
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,63,122,0.1);
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,63,122,0.2);
    }
    #success-msg {
      display: none;
      background: #dcfce7;
      color: #166534;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WK4M33H4"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="form-container">
    <h1>Únete a nuestra Red</h1>
    <p>Postula para recibir proyectos de construcción e instalación en parcelas directamente a tu WhatsApp.</p>
    
    <form id="contratista-form">
      <div class="input-group">
        <label>Nombre o Empresa</label>
        <input type="text" id="nombre" required placeholder="Ej: Construcciones Lautaro">
      </div>
      
      <div class="input-group">
        <label>Teléfono (WhatsApp)</label>
        <input type="tel" id="telefono" required placeholder="+569...">
      </div>

      <div class="input-group">
        <label>Comuna Base / Zona Principal</label>
        <input type="text" id="ubicacion" required placeholder="Ej: Yumbel, Biobío">
      </div>

      <div class="input-group">
        <label>Especialidad Principal</label>
        <select id="especialidad" required>
          <option value="" disabled selected>Selecciona tu rubro...</option>
          <option value="Radieres y Fundaciones">Radieres y Fundaciones</option>
          <option value="Armado de Casas">Armado de Casas / Prefabricadas</option>
          <option value="Llave en Mano">Proyectos Llave en Mano</option>
          <option value="Fosas y Cercos">Fosas, Cercos y Limpieza</option>
          <option value="Ingeniería y Proyectos">Ingeniería / Proyectos Mayores</option>
          <option value="Otro">Otro (Gasfitería, Electricidad, etc.)</option>
        </select>
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">Enviar Postulación</button>
    </form>
    
    <div id="success-msg">
      ¡Gracias por postular! Revisaremos tus datos y nos pondremos en contacto pronto.
    </div>
  </div>

  <script>
    document.getElementById('contratista-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.textContent = 'Enviando...';
      btn.disabled = true;

      const payload = {
        nombre: document.getElementById('nombre').value,
        telefono: document.getElementById('telefono').value,
        ubicacion_base: document.getElementById('ubicacion').value,
        actividad_especialidad: document.getElementById('especialidad').value,
        estado: 'Pendiente' // Queda pendiente hasta que el admin lo active en el CRM
      };

      try {
        const response = await fetch('https://qxavbqhyqaqalpzbhwmh.supabase.co/rest/v1/contratistas', {
          method: 'POST',
          headers: {
            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4YXZicWh5cWFxYWxwemJod21oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5Nzc4MTIsImV4cCI6MjA5OTU1MzgxMn0.7-z6nCdXzurbVbkWQrL7hylblqj7SFPK8oyndLOeZEA',
            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4YXZicWh5cWFxYWxwemJod21oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5Nzc4MTIsImV4cCI6MjA5OTU1MzgxMn0.7-z6nCdXzurbVbkWQrL7hylblqj7SFPK8oyndLOeZEA',
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload)
        });

        if(response.ok) {
          document.getElementById('contratista-form').style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';
        } else {
          alert('Hubo un error al enviar. Por favor, intenta más tarde.');
          btn.textContent = 'Enviar Postulación';
          btn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        alert('Hubo un error de conexión.');
        btn.textContent = 'Enviar Postulación';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
