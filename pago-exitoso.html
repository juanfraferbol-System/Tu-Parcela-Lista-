<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Pago Exitoso! - Tu Parcela Lista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #0c2b2e;
      --secondary: #00828a;
      --accent: #ffb800;
      --background: #f8fafc;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .success-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      max-width: 500px;
      width: 90%;
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      color: var(--primary);
      margin-bottom: 16px;
      font-size: 2rem;
    }
    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: var(--secondary);
      color: white;
      padding: 14px 32px;
      border-radius: 99px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="icon-wrapper">
      <i data-lucide="check-circle" style="width: 40px; height: 40px;"></i>
    </div>
    <h1>¡Pago Recibido con Éxito!</h1>
    <p>Hemos recibido tu orden de <strong>Video IA</strong>. Nuestro equipo de "magia" tecnológica ya está procesando tu solicitud usando los datos de tu cotización.</p>
    <p style="font-size: 0.9rem; background: #f1f5f9; padding: 12px; border-radius: 8px;">En unos momentos enviaremos el enlace con el video renderizado directamente a tu correo electrónico.</p>
    <a href="index.html" class="btn">Volver al Inicio</a>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
